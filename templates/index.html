<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alza Review Sentiment Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 6px;
    }

    .header p {
      color: #718096;
      font-size: 0.95rem;
    }

    .badge {
      display: inline-block;
      background: #ebf8ff;
      color: #2b6cb0;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      min-height: 110px;
      transition: border-color 0.2s;
      color: #2d3748;
      outline: none;
    }

    textarea:focus { border-color: #4299e1; }

    textarea::placeholder { color: #a0aec0; }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 14px;
      background: #3182ce;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #2b6cb0; }
    button:active { transform: scale(0.99); }
    button:disabled { background: #a0aec0; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 12px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result.positive {
      background: #f0fff4;
      border: 1.5px solid #9ae6b4;
    }

    .result.negative {
      background: #fff5f5;
      border: 1.5px solid #feb2b2;
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .emoji { font-size: 2rem; }

    .result-label {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .positive .result-label { color: #276749; }
    .negative .result-label { color: #9b2335; }

    .confidence-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .confidence-bar-wrap {
      flex: 1;
      background: #e2e8f0;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }

    .confidence-bar {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .positive .confidence-bar { background: #48bb78; }
    .negative .confidence-bar { background: #fc8181; }

    .confidence-label {
      font-size: 0.85rem;
      font-weight: 600;
      min-width: 42px;
      text-align: right;
    }

    .positive .confidence-label { color: #276749; }
    .negative .confidence-label { color: #9b2335; }

    .review-text {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #4a5568;
      font-style: italic;
      border-top: 1px solid #e2e8f0;
      padding-top: 10px;
    }

    .examples {
      margin-top: 28px;
    }

    .examples h3 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1.5px solid #e2e8f0;
      background: white;
      color: #4a5568;
      transition: all 0.15s;
    }

    .chip:hover {
      border-color: #4299e1;
      color: #2b6cb0;
      background: #ebf8ff;
    }

    .error {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="badge">CZ/SK · Alza Reviews</div>
      <h1>Sentiment Analyzer</h1>
      <p>Trained on AirPods 4 ANC reviews — paste any Czech or Slovak product review snippet.</p>
    </div>

    <textarea id="reviewInput" placeholder="e.g. Skvělý zvuk, perfektně sedí v uších..."></textarea>
    <button id="analyzeBtn" onclick="analyze()">Analyze Sentiment</button>

    <div class="error" id="errorBox"></div>

    <div class="result" id="resultBox">
      <div class="result-top">
        <span class="emoji" id="emoji"></span>
        <span class="result-label" id="sentimentLabel"></span>
      </div>
      <div class="confidence-row">
        <div class="confidence-bar-wrap">
          <div class="confidence-bar" id="confBar" style="width:0%"></div>
        </div>
        <span class="confidence-label" id="confLabel"></span>
      </div>
      <div class="review-text" id="reviewEcho"></div>
    </div>

    <div class="examples">
      <h3>Try an example</h3>
      <div class="example-chips">
        <span class="chip" onclick="setExample('skvělý zvuk, perfektně sedí')">skvělý zvuk, perfektně sedí</span>
        <span class="chip" onclick="setExample('Cena je příliš vysoká')">Cena je příliš vysoká</span>
        <span class="chip" onclick="setExample('ANC funguje skvěle')">ANC funguje skvěle</span>
        <span class="chip" onclick="setExample('vypadává z uší')">vypadává z uší</span>
        <span class="chip" onclick="setExample('kvalitný zvuk a dlhá výdrž')">kvalitný zvuk a dlhá výdrž</span>
        <span class="chip" onclick="setExample('Chybí napájecí kabel')">Chybí napájecí kabel</span>
      </div>
    </div>
  </div>

  <script>
    function setExample(text) {
      document.getElementById('reviewInput').value = text;
      analyze();
    }

    async function analyze() {
      const text = document.getElementById('reviewInput').value.trim();
      const btn = document.getElementById('analyzeBtn');
      const resultBox = document.getElementById('resultBox');
      const errorBox = document.getElementById('errorBox');

      if (!text) {
        errorBox.textContent = 'Please enter a review first.';
        errorBox.style.display = 'block';
        resultBox.style.display = 'none';
        return;
      }

      errorBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Analyzing...';

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        const data = await res.json();

        if (data.error) {
          errorBox.textContent = data.error;
          errorBox.style.display = 'block';
          resultBox.style.display = 'none';
          return;
        }

        // Update result UI
        resultBox.className = `result ${data.sentiment}`;
        document.getElementById('emoji').textContent = data.sentiment === 'positive' ? '😊' : '😞';
        document.getElementById('sentimentLabel').textContent =
          data.sentiment === 'positive' ? 'Positive review' : 'Negative review';
        document.getElementById('confBar').style.width = data.confidence + '%';
        document.getElementById('confLabel').textContent = data.confidence + '%';
        document.getElementById('reviewEcho').textContent = '"' + data.text + '"';

        resultBox.style.display = 'block';
      } catch (err) {
        errorBox.textContent = 'Something went wrong. Is the server running?';
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze Sentiment';
      }
    }

    // Allow Enter key (Ctrl+Enter to submit)
    document.getElementById('reviewInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) analyze();
    });
  </script>
</body>
</html>
